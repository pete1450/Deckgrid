name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist

      - name: Create source archive
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          git archive --format=tar.gz --prefix=deckgrid-${TAG}/ HEAD \
            -o dist/deckgrid-${TAG}-source.tar.gz

      - name: Create release draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*-source.tar.gz
